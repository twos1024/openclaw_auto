name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  frontend:
    name: Frontend Lint and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit and integration tests
        run: npm run test:unit
