name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Build ${{ matrix.platform.name }}
    needs: validate
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
            artifact_paths: release/*.exe
          - name: macos
            os: macos-latest
            artifact_paths: release/*.dmg
          - name: linux
            os: ubuntu-22.04
            artifact_paths: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libnotify-dev \
            libgconf-2-4 \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xauth \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ClawDesk ${{ github.ref_name }}
          body: Automated release build for ClawDesk.
          draft: false
          prerelease: false
          files: ${{ matrix.platform.artifact_paths }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: clawdesk-${{ matrix.platform.name }}-${{ github.ref_name }}
          path: ${{ matrix.platform.artifact_paths }}
          if-no-files-found: error
