name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
            bundle: nsis
          - name: macos
            os: macos-latest
            bundle: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ClawDesk ${{ github.ref_name }}
          releaseBody: Automated release build for ClawDesk.
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.platform.bundle }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdesk-${{ matrix.platform.name }}-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
